<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Processing affinity matrix</title>
  <desc id="desc">A diagram showing how element category, processing tier, heat band, binder, affinity, and visual genes become reviewable downstream behavior.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#071018"/><stop offset="1" stop-color="#15130d"/></linearGradient>
    <style>.label{font:800 12px Inter,ui-sans-serif,system-ui,sans-serif;letter-spacing:.16em;fill:#90ff1a}.title{font:850 40px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f3f8ff}.copy{font:500 17px Inter,ui-sans-serif,system-ui,sans-serif;fill:#b8c7d4}.card{fill:rgba(255,255,255,.06);stroke:rgba(255,255,255,.16);stroke-width:1.2;rx:16}.head{font:800 18px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f3f8ff}.small{font:600 13px Inter,ui-sans-serif,system-ui,sans-serif;fill:#bdd0df}.mono{font:750 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#f7d98f}.line{stroke:#8fdcff;stroke-width:3;fill:none}</style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1110" cy="112" r="250" fill="#83ff00" opacity=".08"/><circle cx="180" cy="620" r="280" fill="#00c2ff" opacity=".08"/>
  <text x="70" y="78" class="label">ELEMENT REVIEW SURFACE</text>
  <text x="70" y="132" class="title">Processing rules shape material behavior.</text>
  <text x="70" y="168" class="copy">A category change should expose its impact on stations, heat, binders, material affinity, and visual systems.</text>
  <g transform="translate(70 246)"><rect class="card" width="226" height="274"/><text x="24" y="44" class="head">Element identity</text><text x="24" y="82" class="mono">symbol</text><text x="24" y="110" class="mono">group / period</text><text x="24" y="138" class="mono">category</text><text x="24" y="166" class="mono">standardState</text><text x="24" y="210" class="small">Canonical data record</text></g>
  <g transform="translate(372 220)"><rect class="card" width="250" height="326"/><text x="24" y="44" class="head">Processing map</text><text x="24" y="82" class="mono">tier</text><text x="24" y="112" class="mono">station</text><text x="24" y="142" class="mono">heat</text><text x="24" y="172" class="mono">binder</text><text x="24" y="216" class="small">Examples</text><text x="24" y="246" class="small">alloyForge</text><text x="24" y="272" class="small">cryogenicTrap</text></g>
  <g transform="translate(698 220)"><rect class="card" width="220" height="326"/><text x="24" y="44" class="head">Affinity layer</text><text x="24" y="82" class="small">tool value</text><text x="24" y="112" class="small">forging risk</text><text x="24" y="142" class="small">rarity pressure</text><text x="24" y="172" class="small">visual material</text><text x="24" y="216" class="mono">affinity.*</text><text x="24" y="246" class="mono">visualGene.*</text></g>
  <g transform="translate(994 246)"><rect class="card" width="214" height="274"/><text x="24" y="44" class="head">Consumers</text><text x="24" y="82" class="small">resource rules</text><text x="24" y="112" class="small">forge recipes</text><text x="24" y="142" class="small">material rendering</text><text x="24" y="172" class="small">future item metadata</text><text x="24" y="218" class="small">No duplicated taxonomy</text></g>
  <path class="line" d="M296 382 H372"/><path class="line" d="M622 382 H698"/><path class="line" d="M918 382 H994"/>
  <text x="226" y="632" class="copy">Semantic changes should be reviewable before they affect mining, forging, rendering, or economy code.</text>
</svg>
